# Nicer control row + keep playbar consistently visible
controls=menu,gap,subtitles,<has_many_audio>audio,<has_many_video>video,gap,space,speed,space,prev,play-pause,next,gap,shuffle,loop-playlist,loop-file,gap,fullscreen
timeline_style=diamond
timeline_persistency=always
timeline_opacity=0.95
timeline_border=2
controls_size=36
controls_size_fullscreen=44
controls_margin=12
controls_spacing=4

# Cleaner top bar and subtle visual polish
top_bar=always
top_bar_controls=yes
top_bar_title=yes
window_border_size=2
pause_indicator=flash

# Better looking (but still light) thumbnails
font_bold=yes
