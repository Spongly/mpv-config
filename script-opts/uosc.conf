# Keep UI visible during video playback so the playbar doesn't disappear
timeline_style=diamond
timeline_persistency=video,paused
timeline_opacity=0.95
timeline_border=2
timeline_size_min=18
timeline_size_max=54

# Always show controls while video is playing/paused
controls=menu,gap,subtitles,<has_many_audio>audio,<has_many_video>video,gap,command:skip_previous:script-binding uosc/prev?Previous,command:play_arrow:cycle pause?Play/Pause,command:skip_next:script-binding uosc/next?Next,gap,speed,space,fullscreen
controls_persistency=video,paused
controls_size=36
controls_size_fullscreen=42
controls_margin=12
controls_spacing=4

# Top bar polish
top_bar=always
top_bar_persistency=video,paused
top_bar_controls=yes
top_bar_title=yes
window_border_size=2
pause_indicator=flash
font_bold=yes
