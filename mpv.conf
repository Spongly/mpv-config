# Use uosc as the only on-screen controller
osc=no

# Stable GPU playback defaults
vo=gpu
hwdec=auto-safe

# Smoother playback with moderate load
video-sync=display-resample
interpolation=yes
tscale=oversample

# Keep quality tweaks light
deband=yes
scale=bilinear
cscale=bilinear
dscale=mitchell

# Existing behavior
sub-visibility=yes
sub-auto=fuzzy
audio-file-auto=fuzzy
save-position-on-quit=yes
autofit-larger=100%x100%
geometry=50%:50%
sub-font-size=50
