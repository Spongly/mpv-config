# Keep default OSC disabled so uosc handles timeline/playbar
osc=no

# Better video quality while keeping performance safe
vo=gpu
profile=gpu-hq
hwdec=auto-safe

# Smoother motion without heavy interpolation shaders
video-sync=display-resample
interpolation=yes
tscale=oversample

# Mild quality improvements
deband=yes
scale=ewa_lanczossharp
cscale=ewa_lanczossoft
dscale=mitchell

# Existing behavior
sub-visibility=yes
sub-auto=fuzzy
audio-file-auto=fuzzy
save-position-on-quit=yes
autofit-larger=100%x100%
geometry=50%:50%
sub-font-size=50
